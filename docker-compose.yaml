 
x-airflow-common:
  &airflow-common
  # image: my-airflow:latest 
  # image: ${AIRFLOW_IMAGE_NAME:-apache/airflow:2.10.4}

  image: apache/airflow:2.10.4    # back to original image, no build
  user: "0:0" 
  environment:
    &airflow-common-env
    AIRFLOW_UID: ${AIRFLOW_UID:-1000}
    AIRFLOW_GID: 0
    AIRFLOW__CORE__EXECUTE_TASKS_NEW_PYTHON_INTERPRETER: 'true'
    AIRFLOW__CORE__EXECUTOR: LocalExecutor
    AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://airflow:airflow@postgres_airflow/airflow
    AIRFLOW__CORE__FERNET_KEY: ''
    AIRFLOW__CORE__DAGS_ARE_PAUSED_AT_CREATION: 'true'
    AIRFLOW__CORE__LOAD_EXAMPLES: 'False'
    AIRFLOW__API__AUTH_BACKENDS: 'airflow.api.auth.backend.basic_auth,airflow.api.auth.backend.session'
    AIRFLOW__SCHEDULER__ENABLE_HEALTH_CHECK: 'true'
    # _PIP_ADDITIONAL_REQUIREMENTS: ${_PIP_ADDITIONAL_REQUIREMENTS:-apache-airflow-providers-apache-spark}
   
  
  volumes:
    - ${AIRFLOW_PROJ_DIR:-.}/dags:/opt/airflow/dags
    - ${AIRFLOW_PROJ_DIR:-.}/logs:/opt/airflow/logs
    - ${AIRFLOW_PROJ_DIR:-.}/config:/opt/airflow/config
    - ${AIRFLOW_PROJ_DIR:-.}/plugins:/opt/airflow/plugins
    - ${AIRFLOW_PROJ_DIR:-.}/data:/opt/airflow/data
    - /var/run/docker.sock:/var/run/docker.sock
  # user: "${AIRFLOW_UID:-50000}:0"
  # user: "${AIRFLOW_UID:-1000}:0"
  
  depends_on:
    &airflow-common-depends-on
    postgres_airflow:
      condition: service_healthy

networks:
  sparknet:
    driver: bridge
    ipam:
      config:
        - subnet: 172.30.0.0/16

services:
  # --- AIRFLOW INFRASTRUCTURE ---
  postgres_airflow:
    image: postgres:13
    container_name: postgres_airflow
    environment:
      POSTGRES_USER: airflow
      POSTGRES_PASSWORD: airflow
      POSTGRES_DB: airflow
    volumes:
      - postgres-db-volume:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "airflow"]
      interval: 10s
      retries: 5
      start_period: 5s
    restart: always
    networks:
      sparknet:
        ipv4_address: 172.30.1.14

  airflow-webserver:
    <<: *airflow-common
    container_name: airflow-webserver
    command: webserver
    ports:
      - "18080:8080"
    healthcheck:
      test: ["CMD", "curl", "--fail", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s
    restart: always
    depends_on:
      <<: *airflow-common-depends-on
      airflow-init:
        condition: service_completed_successfully
    networks:
      sparknet:
        ipv4_address: 172.30.1.15

  airflow-scheduler:
    <<: *airflow-common
    container_name: airflow-scheduler
    command: scheduler
    healthcheck:
      test: ["CMD", "curl", "--fail", "http://localhost:8974/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s
    restart: always
    depends_on:
      <<: *airflow-common-depends-on
      airflow-init:
        condition: service_completed_successfully
    networks:
      sparknet:
        ipv4_address: 172.30.1.16

  airflow-triggerer:
    <<: *airflow-common
    container_name: airflow-triggerer
    command: triggerer
    restart: always
    depends_on:
      <<: *airflow-common-depends-on
      airflow-init:
        condition: service_completed_successfully
    networks:
      sparknet:
        ipv4_address: 172.30.1.17


  airflow-init:
    <<: *airflow-common
    container_name: airflow-init
    user: "0:0" # Root is needed only for the initial chown/setup
    command:
      - bash
      - -c
      - |
        # Initialize the database
        airflow db migrate
        # Create the admin user (|| true prevents error if user already exists)
        airflow users create --username airflow --password airflow --firstname Air --lastname Flow --role Admin --email airflow@example.com || true
        # Ensure folders have correct permissions for the airflow user
        mkdir -p /opt/airflow/dags /opt/airflow/logs /opt/airflow/plugins /opt/airflow/data
        chown -R 50000:0 /opt/airflow
    networks:
      sparknet:
        ipv4_address: 172.30.1.18

